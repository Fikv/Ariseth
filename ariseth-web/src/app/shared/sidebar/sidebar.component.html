<div class="sidebar">
  <a
    class="sidebar-btn"
    *ngFor="let item of menu"
    #linkActive="routerLinkActive"
    [title]="item.label"
    [routerLink]="item.route"
    routerLinkActive="sidebar-btn-active"
    [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' || item.route === '/okabber' }"
    [attr.aria-current]="linkActive.isActive ? 'page' : null"
  >
    <svg
      class="sidebar-icon"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-linecap="round"
      stroke-linejoin="round"
      [attr.aria-label]="item.label"
      [ngSwitch]="item.icon"
    >
      <ng-container *ngSwitchCase="'home'">
        <path d="M3 10.5 12 3l9 7.5" />
        <path d="M5.5 9.5V21h13V9.5" />
      </ng-container>

      <ng-container *ngSwitchCase="'settings'">
        <circle cx="12" cy="12" r="3.5" />
        <path d="M12 2.75v2.5" />
        <path d="M12 18.75v2.5" />
        <path d="m5.46 5.46 1.77 1.77" />
        <path d="m16.77 16.77 1.77 1.77" />
        <path d="M2.75 12h2.5" />
        <path d="M18.75 12h2.5" />
        <path d="m5.46 18.54 1.77-1.77" />
        <path d="m16.77 7.23 1.77-1.77" />
      </ng-container>

      <ng-container *ngSwitchCase="'dayplanner'">
        <rect x="4" y="5" width="16" height="15" rx="2" />
        <path d="M8 3.5v3" />
        <path d="M16 3.5v3" />
        <path d="M4 9.5h16" />
        <path d="M8 13h3" />
        <path d="M13 13h3" />
        <path d="M8 16h3" />
      </ng-container>

      <ng-container *ngSwitchCase="'profile'">
        <circle cx="12" cy="8" r="3.5" />
        <path d="M5 20c1.6-3.2 4-4.8 7-4.8s5.4 1.6 7 4.8" />
      </ng-container>

      <ng-container *ngSwitchCase="'logo'">
        <rect x="6" y="6" width="12" height="12" rx="2" transform="rotate(45 12 12)" />
        <rect x="10" y="10" width="4" height="4" fill="currentColor" stroke="none" transform="rotate(45 12 12)" />
      </ng-container>
    </svg>
  </a>
</div>
